<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content=
        "width=device-width, initial-scale=1.0"
    >

    <title>
        Multimodal RAG
    </title>

    <link
        rel="stylesheet"
        href="/frontend/style.css"
    >

</head>

<body>

    <div class="container">

        <h1>
            Multimodal RAG
        </h1>

        <div class="upload-section">

            <input
                type="file"
                id="pdfFile"
            >

            <button onclick="uploadPDF()">
                Upload PDF
            </button>

        </div>

        <div
            class="chat-container"
            id="chatContainer"
        >

        </div>

        <div class="input-section">

            <input
                type="text"
                id="question"

                placeholder=
                "Ask something about the PDF..."
            >

            <button onclick="askQuestion()">
                Send
            </button>

        </div>

    </div>

    <script src=
    "https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>

    <script src=
    "/frontend/script.js">
    </script>

</body>

</html>
